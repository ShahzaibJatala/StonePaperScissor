<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="navbar">
     Rock Paper Scissor
    </div>




    
    <div id="choices">
        <button class="choice" id="rock">✊</button>
        <button class="choice" id="paper">🤚</button>
        <button class="choice"  id="scissor">✌</button>
    </div>
    





    <div id="counter">
        <div id="user">
        <p id="user-count">0</p>
        <p>USER</p>
        </div>
        <div id="computer">
        <p id="computer-count">0</p>
        <p>COMPUTER</p>
        </div> 
    </div>



    <div id="last-btn">
    <button class="btn"  id = "button"><b>Play your move</b></button>
    </div>


</body>
<script src="script.js"></script>
</html>
